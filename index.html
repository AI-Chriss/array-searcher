<!DOCTYPE html>
<html lang="pl">
<head>

    <link rel="shortcut icon" type="x-icon" href="./assets/green-logo.svg">
    <link rel="mask-cion" type="x-icon" href="./assets/green-logo.svg" color="#000000">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
